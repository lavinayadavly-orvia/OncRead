<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">OncRead Logo</title>
  <desc id="desc">OncRead logo with sunrise, global oncology update motif and morning briefing tagline.</desc>
  <defs>
    <style>
      .navy { fill: #06275A; }
      .sky { fill: #4AAAF5; }
      .sky-stroke { stroke: #4AAAF5; }
      .orange { fill: #FFB000; }
      .orange-stroke { stroke: #FFB000; }
      .tag { fill: #06275A; font-family: Arial, Helvetica, sans-serif; font-size: 45px; letter-spacing: 11px; font-weight: 600; }
      .word { font-family: Arial, Helvetica, sans-serif; font-size: 185px; font-weight: 700; }
    </style>
  </defs>

  <!-- Transparent background -->
  <rect width="1600" height="900" fill="none"/>

  <!-- Sunrise -->
  <g transform="translate(800 245)">
    <path class="orange" d="M-96,40 A96,96 0 0 1 96,40 Z"/>
    <g class="orange-stroke" stroke-width="10" stroke-linecap="round" fill="none">
      <line x1="0" y1="-120" x2="0" y2="-175"/>
      <line x1="-55" y1="-103" x2="-86" y2="-154"/>
      <line x1="55" y1="-103" x2="86" y2="-154"/>
      <line x1="-96" y1="-66" x2="-146" y2="-104"/>
      <line x1="96" y1="-66" x2="146" y2="-104"/>
      <line x1="-123" y1="-16" x2="-184" y2="-34"/>
      <line x1="123" y1="-16" x2="184" y2="-34"/>
      <line x1="-132" y1="40" x2="-205" y2="40"/>
      <line x1="132" y1="40" x2="205" y2="40"/>
    </g>
  </g>

  <!-- Horizon arc -->
  <path d="M260 332 C520 250, 1080 250, 1340 332" class="sky-stroke" stroke-width="14" stroke-linecap="round" fill="none"/>

  <!-- Dotted world map motif: stylised, editable dots -->
  <g class="sky" opacity="0.9">
    <!-- North America -->
    <circle cx="415" cy="385" r="5"/><circle cx="438" cy="372" r="5"/><circle cx="465" cy="365" r="5"/><circle cx="493" cy="374" r="5"/><circle cx="525" cy="385" r="5"/>
    <circle cx="395" cy="412" r="5"/><circle cx="424" cy="405" r="5"/><circle cx="452" cy="396" r="5"/><circle cx="480" cy="402" r="5"/><circle cx="508" cy="414" r="5"/><circle cx="538" cy="425" r="5"/>
    <circle cx="415" cy="438" r="5"/><circle cx="446" cy="432" r="5"/><circle cx="477" cy="443" r="5"/><circle cx="510" cy="453" r="5"/>
    <circle cx="452" cy="470" r="5"/><circle cx="482" cy="481" r="5"/><circle cx="512" cy="493" r="5"/>
    <circle cx="540" cy="515" r="5"/>
    <!-- South America -->
    <circle cx="590" cy="495" r="5"/><circle cx="612" cy="520" r="5"/><circle cx="625" cy="548" r="5"/><circle cx="635" cy="576" r="5"/>
    <circle cx="648" cy="604" r="5"/><circle cx="662" cy="635" r="5"/><circle cx="648" cy="665" r="5"/><circle cx="626" cy="695" r="5"/>
    <circle cx="604" cy="574" r="5"/><circle cx="612" cy="606" r="5"/><circle cx="625" cy="640" r="5"/>
    <!-- Europe -->
    <circle cx="770" cy="385" r="5"/><circle cx="795" cy="377" r="5"/><circle cx="825" cy="382" r="5"/><circle cx="850" cy="397" r="5"/>
    <circle cx="765" cy="420" r="5"/><circle cx="795" cy="415" r="5"/><circle cx="827" cy="424" r="5"/><circle cx="855" cy="435" r="5"/>
    <!-- Africa -->
    <circle cx="800" cy="462" r="5"/><circle cx="827" cy="472" r="5"/><circle cx="850" cy="498" r="5"/>
    <circle cx="790" cy="500" r="5"/><circle cx="820" cy="515" r="5"/><circle cx="845" cy="542" r="5"/>
    <circle cx="806" cy="550" r="5"/><circle cx="835" cy="578" r="5"/><circle cx="822" cy="612" r="5"/><circle cx="836" cy="648" r="5"/>
    <circle cx="795" cy="590" r="5"/><circle cx="802" cy="628" r="5"/>
    <!-- Asia -->
    <circle cx="890" cy="382" r="5"/><circle cx="925" cy="370" r="5"/><circle cx="960" cy="372" r="5"/><circle cx="996" cy="385" r="5"/><circle cx="1032" cy="402" r="5"/><circle cx="1065" cy="424" r="5"/>
    <circle cx="900" cy="420" r="5"/><circle cx="934" cy="414" r="5"/><circle cx="972" cy="425" r="5"/><circle cx="1010" cy="438" r="5"/><circle cx="1045" cy="462" r="5"/><circle cx="1080" cy="486" r="5"/>
    <circle cx="930" cy="460" r="5"/><circle cx="966" cy="470" r="5"/><circle cx="1002" cy="492" r="5"/><circle cx="1040" cy="525" r="5"/>
    <circle cx="970" cy="515" r="5"/><circle cx="1000" cy="548" r="5"/><circle cx="1040" cy="575" r="5"/>
    <circle cx="1100" cy="540" r="5"/><circle cx="1128" cy="568" r="5"/><circle cx="1150" cy="600" r="5"/>
    <!-- Australia -->
    <circle cx="1135" cy="655" r="5"/><circle cx="1168" cy="645" r="5"/><circle cx="1202" cy="660" r="5"/><circle cx="1230" cy="685" r="5"/>
    <circle cx="1160" cy="690" r="5"/><circle cx="1190" cy="705" r="5"/><circle cx="1220" cy="718" r="5"/>
  </g>

  <!-- Wordmark -->
  <text x="350" y="625" class="word navy">Onc</text>
  <text x="720" y="625" class="word sky">Read</text>

  <!-- Tagline rules -->
  <line x1="355" y1="710" x2="465" y2="710" class="sky-stroke" stroke-width="8" stroke-linecap="round"/>
  <line x1="1145" y1="710" x2="1255" y2="710" class="sky-stroke" stroke-width="8" stroke-linecap="round"/>

  <!-- Tagline -->
  <text x="512" y="724" class="tag">GLOBAL ONCOLOGY UPDATES</text>
  <text x="610" y="792" class="tag">EVERY MORNING</text>
</svg>
