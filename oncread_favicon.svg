<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">OncRead Favicon</title>
  <desc id="desc">OncRead favicon with sunrise over a global oncology briefing horizon.</desc>
  <defs>
    <style>
      .navy { fill: #06275A; }
      .sky { fill: #4AAAF5; }
      .sky-stroke { stroke: #4AAAF5; }
      .orange { fill: #FFB000; }
      .orange-stroke { stroke: #FFB000; }
    </style>
  </defs>

  <rect width="512" height="512" rx="96" fill="#FFFFFF"/>

  <!-- Sunrise -->
  <g transform="translate(256 155)">
    <path class="orange" d="M-58,25 A58,58 0 0 1 58,25 Z"/>
    <g class="orange-stroke" stroke-width="9" stroke-linecap="round" fill="none">
      <line x1="0" y1="-67" x2="0" y2="-105"/>
      <line x1="-38" y1="-52" x2="-62" y2="-86"/>
      <line x1="38" y1="-52" x2="62" y2="-86"/>
      <line x1="-65" y1="-18" x2="-102" y2="-42"/>
      <line x1="65" y1="-18" x2="102" y2="-42"/>
      <line x1="-78" y1="25" x2="-125" y2="25"/>
      <line x1="78" y1="25" x2="125" y2="25"/>
    </g>
  </g>

  <!-- Horizon -->
  <path d="M78 210 C170 160, 342 160, 434 210" class="sky-stroke" stroke-width="13" stroke-linecap="round" fill="none"/>

  <!-- Dotted globe suggestion -->
  <g class="sky" opacity="0.92">
    <circle cx="150" cy="240" r="6"/><circle cx="176" cy="228" r="6"/><circle cx="206" cy="234" r="6"/>
    <circle cx="142" cy="270" r="6"/><circle cx="174" cy="262" r="6"/><circle cx="208" cy="272" r="6"/><circle cx="236" cy="288" r="6"/>
    <circle cx="207" cy="313" r="6"/><circle cx="228" cy="342" r="6"/><circle cx="220" cy="376" r="6"/>

    <circle cx="268" cy="240" r="6"/><circle cx="296" cy="232" r="6"/><circle cx="326" cy="242" r="6"/><circle cx="356" cy="260" r="6"/>
    <circle cx="282" cy="273" r="6"/><circle cx="318" cy="280" r="6"/><circle cx="348" cy="300" r="6"/>
    <circle cx="295" cy="314" r="6"/><circle cx="320" cy="346" r="6"/><circle cx="338" cy="378" r="6"/>
  </g>

  <!-- Compact OR mark -->
  <text x="78" y="442" class="navy" font-family="Arial, Helvetica, sans-serif" font-size="118" font-weight="700">Onc</text>
  <text x="288" y="442" class="sky" font-family="Arial, Helvetica, sans-serif" font-size="118" font-weight="700">R</text>
</svg>
